name: V-SHARP
slug: vsharp
engine: QSMxT / QSM.rs
description: >
  Variable-radius SHARP: SMV deconvolution with a spatially varying kernel radius.
citation: Wu et al., Magn Reson Med 2012
doi: null
code_url: https://github.com/astewartau/QSM.rs
license: MIT
stage: bfr
parameters:
  - name: threshold
    default: 0.02
    description: deconvolution threshold
  - name: max_radius_factor
    default: 0.5
    description: × min voxel size
  - name: min_radius_factor
    default: 0.0
    description: × max voxel size
