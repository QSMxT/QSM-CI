name: RESHARP
slug: resharp
engine: QSMxT / QSM.rs
description: >
  Regularized SHARP with Tikhonov regularization of the deconvolution.
citation: Sun & Wilman, Magn Reson Med 2014
doi: 10.1002/mrm.24765
code_url: https://github.com/astewartau/QSM.rs
license: MIT
stage: bfr
parameters:
  - name: radius
    default: 15.0
    description: SMV kernel radius (mm)
  - name: tik_reg
    default: 1e-3
    description: Tikhonov regularization
