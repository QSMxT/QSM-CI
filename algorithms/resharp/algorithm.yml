name: RESHARP
slug: resharp
stage: bfr
engine: QSMxT / QSM.rs
description: >
  Regularized SHARP with Tikhonov regularization of the deconvolution.
citation: Sun & Wilman, Magn Reson Med 2014
authors:
- name: Hongfu Sun
- name: Alan H. Wilman
doi: 10.1002/mrm.24765
code_url: https://github.com/astewartau/QSM.rs
license: MIT
image: ghcr.io/astewartau/qsm-ci/qsmxt:v9.4.0
run: bash run.sh
parameters:
  - name: radius
    default: 15.0
    tuned: 12.0
    description: SMV kernel radius (mm)
  - name: tik_reg
    default: 1e-3
    description: Tikhonov regularization
