name: iLSQR
slug: ilsqr
stage: dipole
engine: QSMxT / QSM.rs
description: >
  Iterative LSQR inversion with streaking-artifact reduction.
citation: Li et al., NMR Biomed 2015
doi: null
code_url: https://github.com/astewartau/QSM.rs
license: MIT
image: ghcr.io/astewartau/qsm-ci/qsmxt:v1
run: bash run.sh
parameters:
  - name: tol
    default: 1e-4
    description: tolerance
  - name: max_iter
    default: 1000
    description: iterations
