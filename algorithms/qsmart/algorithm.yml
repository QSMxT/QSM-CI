- name: Amy Brodtmann
- name: Bradford A. Moffat
- name: David K. Wright
- name: Rebecca Glarin
- name: Scott Kolbe
- name: Leigh A. Johnston
doi: 10.1016/j.neuroimage.2020.117701
code_url: https://github.com/astewartau/QSM.rs
license: MIT
