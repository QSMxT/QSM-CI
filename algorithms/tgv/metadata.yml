name: TGV
slug: tgv
engine: QSMxT / QSM.rs
description: >
  Total Generalized Variation single-step QSM (unwrap + BFR + inversion).
citation: Langkammer et al., NeuroImage 2015
doi: 10.1016/j.neuroimage.2015.02.041
code_url: https://github.com/astewartau/QSM.rs
license: MIT
stage: dipole
parameters:
  - name: iterations
    default: 1000
    description: iterations
  - name: alpha0
    default: 0.001
    description: 2nd-order weight
  - name: alpha1
    default: 0.002
    description: 1st-order weight
