name: V-SHARP (STI Suite)
slug: matlab-sti-vsharp
stage: bfr
description: V-SHARP background field removal from STI Suite v3 (spatially-varying SMV deconvolution),
  compiled from MATLAB and run on the license-free MATLAB Runtime. Takes the total field and removes
  the background field to yield the local tissue field.
authors:
- name: Bing Wu
- name: Wei Li
- name: Arnaud Guidon
- name: Chunlei Liu
doi: 10.1002/mrm.23000
citation: Wu et al., Magn Reson Med 2012
code_url: https://people.eecs.berkeley.edu/~chunlei.liu/software.html
license: See STI Suite license
image: ghcr.io/astewartau/qsm-ci/matlab-sti-vsharp:v1
run: bash run.sh
matlab:
  entry: recon.m
  runtime: r2026a
params:
- name: smvsize
  default: 12
  description: maximum spherical-mean-value kernel size (voxels) for the SMV deconvolution
