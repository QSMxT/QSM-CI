name: xQSM
slug: xqsm
stage: dipole
description: >
  xQSM — an octave-convolutional, noise-regularized U-Net for QSM dipole inversion. Consumes the
  local (tissue) field in ppm and produces susceptibility (ppm) using the pretrained in-vivo
  checkpoint. The octave convolution adds an X-shaped multi-resolution feature exchange on a U-net
  backbone with a noise-adding regularization layer. Runs CPU-only with PyTorch (no GPU); the network
  auto zero-pads each dimension to a multiple of 8, so there is no fixed matrix size.
