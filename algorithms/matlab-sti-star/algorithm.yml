name: STAR-QSM (STI Suite)
slug: matlab-sti-star
stage: dipole
description: STAR-QSM (streaking artifact reduction) dipole inversion from STI Suite v3, compiled from
  MATLAB and run on the license-free MATLAB Runtime. Fast two-level susceptibility inversion of the
  local field.
authors:
- name: Hongjiang Wei and Chunlei Liu
  affiliation: UC Berkeley
doi: 10.1002/nbm.3383
code_url: https://people.eecs.berkeley.edu/~chunlei.liu/software.html
license: See STI Suite license
image: ghcr.io/astewartau/qsm-ci/matlab-sti-star:v1
run: bash run.sh
matlab:
  entry: recon.m
  runtime: r2026a
params:
- name: padsize
  default: 12
  description: zero-pad size (voxels, isotropic) to improve numerical accuracy of the inversion
