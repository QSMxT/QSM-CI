name: HARPERELLA
slug: harperella
stage: unwrap+bfr
engine: QSMxT / QSM.rs
description: >
  Integrated phase unwrapping + background field removal, operating on wrapped phase.
citation: Li et al., NMR Biomed 2014
authors:
- name: Wei Li
- name: Alexandru V. Avram
- name: Bing Wu
- name: Xue Xiao
- name: Chunlei Liu
doi: 10.1002/nbm.3056
code_url: https://github.com/astewartau/QSM.rs
license: MIT
image: ghcr.io/astewartau/qsm-ci/qsmxt:v9.7.0
run: bash run.sh
parameters:
  - name: radius
    default: 5.0
    description: SMV kernel radius (mm)
  - name: max_iter
    default: 100
    description: iterations
  - name: tol
    default: 1e-4
    description: tolerance
