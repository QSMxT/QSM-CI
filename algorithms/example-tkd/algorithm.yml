# Machine-facing run spec. QSM-CI reads this to execute the submission.
contract: v1

# The container image to run. Must be publicly pullable (GHCR, Docker Hub, quay.io, ...).
# Bring your own image — any language, any base. Pin a digest or tag for reproducibility.
image: ghcr.io/astewartau/qsm-ci/example-tkd:v1

# The command run inside the container. Reads /input, writes /output/chimap.nii.gz.
run: bash run.sh

# Optional: override the default wall-clock timeout (seconds). Capped by the platform.
# timeout: 3600
