<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>QSM-CI — Submission</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script>tailwind.config = { theme: { extend: { fontFamily: { sans: ["Inter", "system-ui", "sans-serif"] } } } };</script>
  <script src="js/app.js"></script>
</head>
<body class="font-sans text-gray-900 bg-gray-50 antialiased">
  <header id="site-nav"></header>

  <main class="mx-auto max-w-7xl px-6 py-8">
    <a href="leaderboard.html" class="inline-flex items-center gap-1.5 text-sm text-gray-500 hover:text-gray-900">
      <svg width="16" height="16" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path d="M15 18l-6-6 6-6" stroke-linecap="round" stroke-linejoin="round"/></svg>
      All results
    </a>

    <div class="mt-4 grid grid-cols-1 lg:grid-cols-[260px_1fr] gap-6">
      <!-- sidebar -->
      <aside class="lg:sticky lg:top-20 self-start">
        <div class="rounded-2xl border border-gray-200 bg-white shadow-sm overflow-hidden">
          <div class="p-3 border-b border-gray-100 space-y-2">
            <div id="nav-toggle" class="inline-flex w-full rounded-lg bg-gray-100 p-1 text-xs font-medium">
              <button data-mode="stages" class="flex-1 rounded-md px-2 py-1 transition">Stages</button>
              <button data-mode="pipelines" class="flex-1 rounded-md px-2 py-1 transition">Pipelines</button>
            </div>
            <input id="run-filter" type="search" placeholder="Filter…" class="w-full rounded-lg border-gray-300 text-sm py-1.5 focus:border-indigo-500 focus:ring-indigo-500" />
          </div>
          <nav id="run-list" class="max-h-[calc(100vh-13rem)] overflow-y-auto p-2"></nav>
        </div>
      </aside>

      <!-- content -->
      <div>
        <div class="rounded-2xl border border-gray-200 bg-white p-6 shadow-sm">
          <div class="flex flex-wrap items-center gap-3">
            <h1 id="sub-title" class="text-2xl font-bold tracking-tight">Loading…</h1>
            <div id="sub-badges" class="flex gap-2"></div>
          </div>
          <p id="sub-meta" class="mt-2 text-sm text-gray-500"></p>
        </div>

        <div class="mt-6 grid xl:grid-cols-5 gap-6">
          <section class="xl:col-span-3 rounded-2xl border border-gray-200 bg-white p-5 shadow-sm">
            <div class="flex flex-wrap items-center gap-4">
              <div class="inline-flex rounded-lg bg-gray-100 p-1 text-sm font-medium" id="layer-tabs">
                <button data-layer="recon" class="rounded-md px-3 py-1 transition">Reconstruction</button>
                <button data-layer="truth" class="rounded-md px-3 py-1 transition">Ground truth</button>
                <button data-layer="error" class="rounded-md px-3 py-1 transition">Error</button>
              </div>
              <label class="flex items-center gap-2 text-sm text-gray-500">Opacity
                <input id="opacity" type="range" min="0" max="1" step="0.05" value="1" class="accent-indigo-600" />
              </label>
              <span id="intensity" class="ml-auto text-xs tabular-nums text-gray-400"></span>
            </div>
            <!-- fixed-height wrapper + absolutely-filled canvas: prevents the NiiVue resize-growth loop -->
            <div class="relative mt-4 rounded-xl overflow-hidden bg-black" style="height:480px">
              <canvas id="gl1" class="absolute inset-0 h-full w-full block"></canvas>
              <div id="viewer-note" class="absolute inset-0 hidden items-center justify-center px-6 text-center text-sm text-gray-400 bg-gray-50"></div>
            </div>
          </section>

          <section class="xl:col-span-2 rounded-2xl border border-gray-200 bg-white p-6 shadow-sm">
            <h2 class="font-semibold text-gray-900">Metrics</h2>
            <p id="metrics-sub" class="mt-0.5 text-xs text-gray-500"></p>
            <table class="mt-4 w-full text-sm">
              <tbody id="metrics-body" class="divide-y divide-gray-100"></tbody>
            </table>
          </section>
        </div>
      </div>
    </div>
  </main>

  <footer id="site-footer"></footer>

  <script type="module" src="js/viewer.js"></script>
</body>
</html>
