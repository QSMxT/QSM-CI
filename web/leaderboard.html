<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <script>
    // Older Zenodo records link here as leaderboard.html?method=<slug>; the per-algorithm page is
    // submission.html. Redirect so those citation links land on the algorithm's page.
    (function () {
      var m = new URLSearchParams(location.search).get("method");
      if (m) location.replace("submission.html?method=" + encodeURIComponent(m));
    })();
  </script>
  <title>QSM-CI — Leaderboard</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script>tailwind.config = { darkMode: "class", theme: { extend: { fontFamily: { sans: ["Inter", "system-ui", "sans-serif"] } } } };</script>
  <script src="js/app.js"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
</head>
<body class="font-sans text-gray-900 bg-gray-50 antialiased dark:bg-gray-950 dark:text-gray-100">
  <header id="site-nav"></header>

  <main x-data="board()" x-init="init()" class="mx-auto max-w-6xl px-6 py-10">
    <div class="flex flex-col sm:flex-row sm:items-end justify-between gap-4">
      <div>
        <h1 class="text-3xl font-bold tracking-tight">Leaderboard</h1>
        <p class="mt-1 text-gray-600">Compare methods per stage, or every pipeline combination.</p>
      </div>
      <div class="inline-flex rounded-xl bg-gray-100 p-1 text-sm font-medium">
        <button @click="view='composed'" :class="view==='composed' ? 'bg-white shadow-sm text-gray-900' : 'text-gray-500 hover:text-gray-700'" class="rounded-lg px-4 py-1.5 transition">Combinations</button>
        <button @click="view='isolated'" :class="view==='isolated' ? 'bg-white shadow-sm text-gray-900' : 'text-gray-500 hover:text-gray-700'" class="rounded-lg px-4 py-1.5 transition">Per stage</button>
      </div>
    </div>

    <!-- sub-controls -->
    <div class="mt-6 flex flex-wrap items-center gap-3">
      <template x-if="hasTuned()">
        <div class="inline-flex rounded-lg bg-gray-100 p-0.5 text-xs font-medium">
          <button @click="variant='default'" :class="variant==='default' ? 'bg-white shadow-sm text-gray-900' : 'text-gray-500 hover:text-gray-700'" class="rounded-md px-3 py-1 transition">Defaults</button>
          <button @click="variant='tuned'" data-tip="Each method's parameters optimised on the QSM-CI scoring phantom (maximising xSIM). Tuning on the scored data is a form of overfitting, and only some methods are tunable (pretrained networks aren't) — so Defaults is the fair cross-method ranking. Applies to the per-stage tables and combined-method rows; the combination matrix stays at defaults." :class="variant==='tuned' ? 'bg-white shadow-sm text-emerald-700' : 'text-gray-500 hover:text-gray-700'" class="rounded-md px-3 py-1 transition">⚙ Tuned</button>
        </div>
      </template>
      <template x-if="view==='isolated'">
        <div class="inline-flex flex-wrap gap-2">
          <template x-for="s in stages()" :key="s">
            <button @click="stage=s; fixSort()" :class="stage===s ? 'bg-emerald-600 text-white' : 'bg-white text-gray-600 ring-1 ring-gray-200 hover:bg-gray-50'" class="rounded-full px-3.5 py-1.5 text-sm font-medium transition" x-text="STAGE_LABEL[s]||s"></button>
          </template>
        </div>
      </template>
      <template x-if="view==='composed' && fmaps().length>1">
        <label class="inline-flex items-center gap-2 text-sm text-gray-600">Field mapping
          <select x-model="fmap" class="rounded-lg border-gray-300 text-sm py-1.5 pr-8">
            <template x-for="f in fmaps()" :key="f"><option :value="f" :selected="f===fmap" x-text="f==='gt' ? 'ground truth' : f"></option></template>
          </select>
        </label>
      </template>
    </div>

    <!-- combination matrix -->
    <template x-if="view==='composed' && matrix.rows.length">
      <div class="mt-6 rounded-2xl border border-gray-200 bg-white p-6 shadow-sm">
        <div class="flex flex-wrap items-center justify-between gap-3">
          <div>
            <h2 class="font-semibold text-gray-900">Combination matrix</h2>
            <p class="mt-0.5 text-xs text-gray-500">Dipole inversion <span class="text-gray-400">↓</span> × background removal <span class="text-gray-400">→</span>, chained end-to-end · best methods top-left · click a cell to inspect.</p>
          </div>
          <label class="inline-flex items-center gap-2 text-sm text-gray-600">Colour by
            <select x-model="metric" class="rounded-lg border-gray-300 text-sm py-1.5 pr-8">
              <template x-for="c in cols" :key="c"><option :value="c" :selected="c===metric" x-text="METRICS[c].label"></option></template>
            </select>
          </label>
        </div>

        <div class="mt-5 overflow-x-auto">
          <div class="inline-grid gap-1.5" :style="`grid-template-columns: auto repeat(${matrix.cols.length}, minmax(6.5rem,1fr))`">
            <template x-for="g in matrix.cells" :key="g.k">
              <div>
                <template x-if="g.t==='header'">
                  <div class="pb-1 text-center text-xs font-semibold text-gray-500 truncate" x-text="g.label"></div>
                </template>
                <template x-if="g.t==='rowlabel'">
                  <div class="flex h-14 items-center justify-end pr-3 text-xs font-semibold text-gray-500 whitespace-nowrap" x-text="g.label"></div>
                </template>
                <template x-if="g.t==='cell'">
                  <button @click="go(g.run)"
                    :title="g.run.combo.bfr+' + '+g.run.combo.dipole+' — '+METRICS[metric].label+': '+fmt(val(g.run,metric),metric)"
                    class="heat-cell group relative h-14 w-full rounded-xl font-semibold text-sm shadow-sm transition hover:z-10 hover:scale-[1.06] hover:shadow-md focus:outline-none"
                    :class="g.run.variant==='tuned' ? 'ring-2 ring-emerald-600 ring-offset-2' : 'ring-1 ring-black/5'"
                    :style="'--heat:'+heat(norm(val(g.run,metric)))">
                    <span x-text="fmt(val(g.run, metric), metric)"></span>
                    <span x-show="g.run.variant==='tuned'" class="absolute -right-1.5 -top-1.5 grid h-4 w-4 place-items-center rounded-full bg-emerald-600 text-[9px] shadow" title="tuned parameters">⚙</span>
                  </button>
                </template>
                <template x-if="g.t==='empty'">
                  <div class="flex h-14 w-full items-center justify-center rounded-xl border border-dashed border-gray-200 text-gray-300 text-sm">—</div>
                </template>
              </div>
            </template>
          </div>
        </div>

        <!-- combined single-method algorithms (span BFR + dipole in one step; not grid cells) -->
        <template x-if="combinedAlgos.length">
          <div class="mt-6 border-t border-gray-100 pt-5">
            <p class="mb-3 text-xs font-semibold uppercase tracking-wide text-gray-500">
              Combined single-method algorithms
              <span class="font-normal normal-case tracking-normal text-gray-400">— one step straight to a χ map</span>
            </p>
            <div class="grid gap-x-10 gap-y-4 sm:grid-cols-2">
              <template x-for="grp in [{stage:'bfr+dipole', label:'Background removal + dipole inversion'}, {stage:'end-to-end', label:'End-to-end'}]" :key="grp.stage">
                <div x-show="combinedAlgos.some(r=>r.stage===grp.stage)">
                  <p class="mb-2 text-[11px] font-semibold uppercase tracking-wide text-gray-400" x-text="grp.label"></p>
                  <div class="flex flex-col gap-1.5">
                    <template x-for="r in combinedAlgos.filter(r=>r.stage===grp.stage)" :key="r.id">
                      <div class="flex items-center gap-3">
                        <div class="w-36 shrink-0 truncate pr-1 text-right text-xs font-semibold text-gray-500" x-text="r.name"></div>
                        <button @click="go(r)"
                          :title="r.name+' — '+METRICS[metric].label+': '+fmt(val(r,metric),metric)+(r.variant==='tuned' ? ' (tuned parameters)' : '')"
                          class="heat-cell group relative h-14 w-40 shrink-0 rounded-xl font-semibold text-sm shadow-sm transition hover:z-10 hover:scale-[1.06] hover:shadow-md focus:outline-none"
                          :class="r.variant==='tuned' ? 'ring-2 ring-emerald-600 ring-offset-2' : 'ring-1 ring-black/5'"
                          :style="'--heat:'+heat(norm(val(r,metric)))">
                          <span x-text="fmt(val(r, metric), metric)"></span>
                          <span x-show="r.variant==='tuned'" class="absolute -right-1.5 -top-1.5 grid h-4 w-4 place-items-center rounded-full bg-emerald-600 text-[9px] shadow" title="tuned parameters">⚙</span>
                        </button>
                      </div>
                    </template>
                  </div>
                </div>
              </template>
            </div>
          </div>
        </template>

        <!-- legend -->
        <div class="mt-5 flex items-center gap-3 text-xs text-gray-500">
          <span x-text="(METRICS[metric].better==='higher'?'worse':'better')"></span>
          <div class="heat-legend h-2.5 w-40 rounded-full ring-1 ring-inset ring-black/5"></div>
          <span x-text="(METRICS[metric].better==='higher'?'better':'worse')"></span>
          <span class="ml-2 tabular-nums" x-text="'range '+fmt(matrix.lo,metric)+' – '+fmt(matrix.hi,metric)"></span>
        </div>
      </div>
    </template>

    <!-- table controls (filter + metric columns), sitting right above the leaderboard -->
    <div class="mt-8 flex flex-wrap items-center gap-3">
      <div class="grow"></div>
      <input x-model="filter" type="search" placeholder="Filter…" class="rounded-lg border-gray-300 text-sm px-3 py-1.5 w-44 focus:border-emerald-500 focus:ring-emerald-500" />
      <!-- metric column picker -->
      <div class="relative" @click.outside="colMenu=false">
        <button @click="colMenu=!colMenu" class="inline-flex items-center gap-1.5 rounded-lg bg-white px-3 py-1.5 text-sm font-medium text-gray-600 ring-1 ring-inset ring-gray-300 hover:bg-gray-50">
          Metrics
          <span class="rounded bg-gray-100 px-1.5 text-xs" x-text="displayCols.length"></span>
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 9l6 6 6-6" stroke-linecap="round" stroke-linejoin="round"/></svg>
        </button>
        <div x-show="colMenu" x-cloak class="absolute right-0 z-20 mt-2 w-56 rounded-xl border border-gray-200 bg-white p-1.5 shadow-lg" style="display:none">
          <template x-for="c in cols" :key="c">
            <label class="flex items-center gap-2.5 rounded-lg px-2.5 py-1.5 text-sm hover:bg-gray-50 cursor-pointer">
              <input type="checkbox" class="accent-emerald-600" :checked="selectedCols.includes(c)" @change="toggleCol(c)" />
              <span x-text="METRICS[c].label" :data-tip="METRICS[c].desc"></span>
              <span class="ml-auto text-xs text-gray-400" x-text="METRICS[c].unit || (METRICS[c].better==='higher'?'↑':'↓')"></span>
            </label>
          </template>
        </div>
      </div>
    </div>

    <!-- table -->
    <div class="mt-4 overflow-hidden rounded-2xl border border-gray-200 bg-white shadow-sm">
      <div class="overflow-x-auto" x-show="!loading" x-cloak>
        <table class="w-full text-sm whitespace-nowrap">
          <thead class="bg-gray-50 text-xs uppercase tracking-wide text-gray-500">
            <tr>
              <th class="px-5 py-3 text-left font-medium sticky left-0 bg-gray-50" x-text="view==='composed' ? 'Pipeline' : 'Algorithm'"></th>
              <template x-for="c in displayCols" :key="c">
                <th @click="sort(c)" class="px-4 py-3 text-right font-medium cursor-pointer select-none hover:text-gray-800 dark:hover:text-gray-100">
                  <span x-text="METRICS[c].label" :data-tip="METRICS[c].desc"></span>
                  <span x-show="sortKey===c" x-text="sortDir==='asc' ? '↑' : '↓'"></span>
                </th>
              </template>
            </tr>
          </thead>
          <tbody class="divide-y divide-gray-100">
            <template x-for="(r, i) in rows" :key="r.id">
              <tr @click="go(r)" class="group cursor-pointer" :class="(r.status==='DNF' ? 'opacity-50 ' : '') + (r.variant==='tuned' ? 'tuned-row' : '')">
                <td class="px-5 py-3 text-left font-medium text-gray-900 sticky left-0 bg-white group-hover:bg-emerald-50/40">
                  <span class="mr-1.5 inline-block w-5 text-center" x-text="medal(i)"></span>
                  <span x-text="r.name"></span>
                  <template x-if="doi(r)">
                    <a :href="doi(r).url" @click.stop target="_blank" rel="noopener"
                       class="ml-2 rounded bg-emerald-50 px-1.5 py-0.5 text-[10px] font-semibold text-emerald-700 hover:bg-emerald-100"
                       :title="'Submission DOI (Zenodo v' + doi(r).version + ')'">DOI</a>
                  </template>
                  <span x-show="r.status==='DNF'" class="ml-2 rounded bg-gray-100 px-1.5 py-0.5 text-[10px] font-semibold text-gray-500">DNF</span>
                  <span x-show="r.variant==='tuned'" class="ml-2 rounded bg-emerald-50 px-1.5 py-0.5 text-[10px] font-semibold text-emerald-700 ring-1 ring-inset ring-emerald-600/25" title="Parameters tuned on the scoring phantom">⚙ tuned</span>
                  <span x-show="ciNotes(r.slug).length" class="ml-2 cursor-help rounded bg-amber-50 px-1.5 py-0.5 text-[10px] font-semibold text-amber-700 ring-1 ring-inset ring-amber-500/30 dark:bg-amber-500/10 dark:text-amber-300" :data-tip="ciNotes(r.slug).join('  •  ')">⚠ note</span>
                </td>
                <template x-for="c in displayCols" :key="c">
                  <td class="px-4 py-3 text-right tabular-nums group-hover:bg-emerald-50/40" :class="c===sortKey ? 'font-semibold text-gray-900' : 'text-gray-600'" x-text="fmt(val(r,c), c)"></td>
                </template>
              </tr>
            </template>
          </tbody>
        </table>
      </div>
      <div x-show="loading" x-cloak class="px-5 py-10 flex items-center justify-center gap-3 text-gray-400">
        <svg class="animate-spin h-5 w-5 text-emerald-500" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
          <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
          <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"></path>
        </svg>
        <span>Loading results…</span>
      </div>
      <p x-show="!loading && rows.length===0" x-cloak class="px-5 py-10 text-center text-gray-400">No results for this view yet.</p>
    </div>
  </main>

  <footer id="site-footer"></footer>
  <style>
    [x-cloak]{display:none!important}
    /* Tuned rows: faint emerald tint + left accent bar, styled per-cell — a tr outline paints
       under the sticky first cell and doubles up between adjacent tuned rows. The sticky cell
       gets the same tint as an opaque colour so columns scrolling beneath it don't show through;
       Tailwind's group-hover classes still win on hover (higher specificity). */
    tr.tuned-row td{background:rgb(236 253 245/.55)}
    tr.tuned-row td:first-child{background:rgb(245 254 249);box-shadow:inset 3px 0 0 rgb(5 150 105/.6)}
    /* Dark counterparts (site themes via html.dark overrides in app.js, and the light values above
       outrank them — so restate both cells here). Sticky cell = emerald tint pre-blended into the
       dark table bg (#111827), kept opaque for the same see-through reason. */
    html.dark tr.tuned-row td{background:rgb(16 185 129/.08)}
    html.dark tr.tuned-row td:first-child{background:rgb(17 37 40);box-shadow:inset 3px 0 0 rgb(52 211 153/.55)}
    /* Combination-matrix cells. heat() supplies the dark-first muted colour in --heat; in light
       mode render it as a pastel wash with dark tinted text (solid mid-tones + white text read
       murky on the white card), in dark mode use it as-is. CSS-only so the theme toggle switches
       cells without an Alpine re-render. */
    .heat-cell{background:color-mix(in srgb,var(--heat) 38%,#fff);color:color-mix(in srgb,var(--heat) 55%,#1f2937)}
    .heat-legend{background:linear-gradient(90deg,
      color-mix(in srgb,#be6b6b 38%,#fff),color-mix(in srgb,#c49e60 38%,#fff),color-mix(in srgb,#6ea886 38%,#fff))}
    html.dark .heat-cell{background:var(--heat);color:#fff}
    html.dark .heat-legend{background:linear-gradient(90deg,#be6b6b,#c49e60,#6ea886)}
  </style>

  <script>
    function board() {
      // Non-reactive memo cache. Alpine getters recompute on EVERY property access, and the composed
      // grid reads matrix.cell / norm() hundreds of times per render — so `matrix` (an O(all-runs)
      // build) was running hundreds of times per click. Cache each derived value keyed by the state
      // it depends on (runs.length busts it when data first loads), so it recomputes only when
      // view/stage/fmap/metric/filter/sort actually change.
      const _memo = {};
      const _cache = (name, key, fn) => {
        const c = _memo[name];
        if (c && c.key === key) return c.val;
        const val = fn(); _memo[name] = { key, val }; return val;
      };
      // Robust colour-scale window: clamp to the Tukey fences so a few extreme-outlier cells (e.g. a
      // broken method's huge NRMSE) can't crush everyone else into one colour. Outliers saturate at
      // the extreme; the bulk gets the full gradient. Falls back to true min/max when there are no
      // outliers (fence wider than the data) or too few points.
      const robustRange = (vals) => {
        const s = vals.filter((v) => v != null && isFinite(v)).sort((a, b) => a - b);
        const n = s.length;
        if (n < 4) return [s[0] ?? 0, s[n - 1] ?? 1];
        const q = (p) => s[Math.min(n - 1, Math.max(0, Math.round(p * (n - 1))))];
        const q1 = q(0.25), q3 = q(0.75), iqr = q3 - q1;
        const lo = Math.max(s[0], q1 - 1.5 * iqr), hi = Math.min(s[n - 1], q3 + 1.5 * iqr);
        return lo < hi ? [lo, hi] : [s[0], s[n - 1]];
      };
      return {
        METRICS, STAGE_LABEL, MEDALS, fmt, val,
        runs: [], registry: {}, algos: [], view: "composed", stage: "dipole", fmap: "gt",
        variant: "default",
        metric: "xsim", sortKey: "xsim", sortDir: "desc", filter: "",
        colMenu: false, selectedCols: ["nrmse", "correlation", "xsim", "runtime_s"],
        loading: true,
        // ci_notes: per-method infrastructure caveats (algorithms.json), surfaced as a ⚠ badge that
        // tooltips the notes; clicking the row opens the method's submission page with the full text.
        ciNotes(slug) { const a = this.algos.find((x) => x.slug === slug); return (a && a.ci_notes) || []; },
        async init() {
          // Deep-link support: leaderboard.html?view=isolated&stage=dipole&variant=tuned
          const q = new URLSearchParams(location.search);
          if (["composed", "isolated"].includes(q.get("view"))) this.view = q.get("view");
          if (q.get("variant") === "tuned") this.variant = "tuned";
          try {
            this.runs = await loadRuns();
            this.registry = await loadRegistry();
            this.algos = await loadAlgos();
            const st = this.stages();
            if (st.includes(q.get("stage"))) this.stage = q.get("stage");
            else if (!st.includes(this.stage)) this.stage = st[0] || "dipole";
            if (!this.runs.some((r) => r.mode === "composed")) this.view = "isolated";
          } finally {
            this.loading = false;   // only reveal the empty-state once the fetch has actually resolved
          }
        },
        // Zenodo DOI for a method row (isolated view only; pipelines aren't single methods).
        doi(r) { return this.view === "isolated" ? doiFor(this.registry, r.slug) : null; },
        stages() { return [...new Set(this.runs.filter((r) => r.mode === "isolated").map((r) => r.stage))]; },
        fmaps() { return [...new Set(this.runs.filter((r) => r.mode === "composed" && r.combo).map((r) => r.combo.field_mapping || "gt"))]; },
        // Any tuned (optimised-on-the-scoring-phantom) runs present? Gates the Defaults/Tuned toggle.
        hasTuned() { return this.runs.some((r) => r.variant === "tuned"); },
        // Pick one run per method for the selected variant. In "tuned" mode a method with no tuned run
        // (pretrained nets, or already-optimal defaults) falls back to its default run, so the toggle
        // never drops methods — it only lifts the ones we optimised.
        pickVariant(pool) {
          if (this.variant !== "tuned") return pool.filter((r) => (r.variant || "default") === "default");
          const by = {};
          pool.forEach((r) => { (by[r.slug] ||= {})[r.variant || "default"] = r; });
          return Object.values(by).map((v) => v.tuned || v.default).filter(Boolean);
        },
        get baseRows() {
          return _cache("baseRows", this.view + "|" + this.stage + "|" + this.fmap + "|" + this.variant + "|" + this.runs.length, () =>
            this.view === "isolated"
              ? this.pickVariant(this.runs.filter((r) => r.mode === "isolated" && r.stage === this.stage))
              // Composed matrix is default-only (we don't run the tuned combinatorial matrix), so it
              // ignores the variant toggle.
              : this.runs.filter((r) => r.mode === "composed" && (!r.combo || (r.combo.field_mapping || "gt") === this.fmap)));
        },
        get cols() { return _cache("cols", this.view + "|" + this.stage + "|" + this.fmap + "|" + this.variant + "|" + this.runs.length, () => metricCols(this.baseRows)); },
        get displayCols() {
          const sel = this.cols.filter((c) => this.selectedCols.includes(c));
          return sel.length ? sel : this.cols.filter((c) => c === "xsim");
        },
        toggleCol(c) {
          this.selectedCols = this.selectedCols.includes(c) ? this.selectedCols.filter((x) => x !== c) : [...this.selectedCols, c];
        },
        get rows() {
          return _cache("rows",
            [this.view, this.stage, this.fmap, this.variant, this.filter, this.sortKey, this.sortDir, this.runs.length].join("|"), () => {
              const f = this.filter.toLowerCase();
              return this.baseRows.filter((r) => !f || r.name.toLowerCase().includes(f)).slice().sort((a, b) => {
                const av = val(a, this.sortKey), bv = val(b, this.sortKey);
                if (av == null) return 1; if (bv == null) return -1;
                return this.sortDir === "asc" ? av - bv : bv - av;
              });
            });
        },
        get matrix() {
          return _cache("matrix", this.fmap + "|" + this.metric + "|" + this.runs.length, () => {
            const rs = this.runs.filter((r) => r.mode === "composed" && r.combo && (r.combo.field_mapping || "gt") === this.fmap);
            const bfrs = [...new Set(rs.map((r) => r.combo.bfr))];
            const dips = [...new Set(rs.map((r) => r.combo.dipole))];
            const cell = {}; rs.forEach((r) => { cell[r.combo.bfr + "|" + r.combo.dipole] = r; });
            const [lo, hi] = robustRange(rs.map((r) => val(r, this.metric)));
            // Rank each axis by mean "goodness" (direction-aware, 0=worst..1=best) so the strongest
            // methods sit toward the top-left. Rows = dipole inversion, columns = background removal.
            const better = METRICS[this.metric]?.better || "higher";
            const good = (r) => { const v = r ? val(r, this.metric) : null; if (v == null) return null; const t = hi === lo ? 0.5 : (v - lo) / (hi - lo); return better === "lower" ? 1 - t : t; };
            const mean = (ks) => { const g = ks.map((k) => good(cell[k])).filter((v) => v != null); return g.length ? g.reduce((a, c) => a + c, 0) / g.length : -Infinity; };
            const rows = dips.slice().sort((a, b) => mean(bfrs.map((x) => x + "|" + b)) - mean(bfrs.map((x) => x + "|" + a)));
            const cols = bfrs.slice().sort((a, b) => mean(dips.map((x) => b + "|" + x)) - mean(dips.map((x) => a + "|" + x)));
            // Flatten the grid into one ordered list of cells, each with a *position-independent* key.
            // The matrix reorders when metric/fmap changes; a single keyed x-for reorders cleanly,
            // whereas nested x-for + x-if in a CSS grid mis-reconciles on reorder (cells land in the
            // wrong slots). Order per row = row-label then one cell per column.
            const cells = [{ k: "corner", t: "corner" }];
            cols.forEach((c) => cells.push({ k: "h|" + c, t: "header", label: c }));
            rows.forEach((rw) => {
              cells.push({ k: "rl|" + rw, t: "rowlabel", label: rw });
              cols.forEach((c) => {
                const run = cell[c + "|" + rw];
                cells.push(run ? { k: "c|" + c + "|" + rw, t: "cell", run } : { k: "x|" + c + "|" + rw, t: "empty" });
              });
            });
            return { rows, cols, cell, lo, hi, cells };
          });
        },
        // Single-method algorithms that span background removal + dipole inversion (e.g. TGV,
        // QSMART, matlab-medi) in one step. They take the ground-truth field and produce a chimap,
        // so they're directly comparable to full pipelines, but can't be a cell in the BFR×dipole
        // grid. Shown as a separate row-group below the matrix (composed view only).
        get combinedAlgos() {
          return _cache("combinedAlgos", this.fmap + "|" + this.metric + "|" + this.variant + "|" + this.runs.length, () =>
            this.pickVariant(this.runs.filter((r) => r.mode === "isolated"
              && (r.stage === "bfr+dipole" || r.stage === "end-to-end")
              && r.artifact === "chimap" && val(r, this.metric) != null))
              .slice().sort((a, b) => this.norm(val(b, this.metric)) - this.norm(val(a, this.metric))));
        },
        norm(v) { // 0 = worst, 1 = best (respecting metric direction)
          const m = this.matrix; if (v == null || m.hi === m.lo) return 0.5;
          let t = (v - m.lo) / (m.hi - m.lo);
          return (METRICS[this.metric]?.better || "higher") === "lower" ? 1 - t : t;
        },
        heat(t) { // muted red -> gold -> sage
          const s = [[190, 107, 107], [196, 158, 96], [110, 168, 134]];
          const x = Math.max(0, Math.min(1, t)) * 2, i = Math.min(1, Math.floor(x)), f = x - i;
          const c = s[i].map((a, k) => Math.round(a + (s[i + 1][k] - a) * f));
          return `rgb(${c[0]},${c[1]},${c[2]})`;
        },
        sort(k) {
          if (this.sortKey === k) this.sortDir = this.sortDir === "asc" ? "desc" : "asc";
          else { this.sortKey = k; this.sortDir = METRICS[k]?.better === "lower" ? "asc" : "desc"; }
        },
        fixSort() { if (!this.cols.includes(this.sortKey)) { this.sortKey = "xsim"; this.sortDir = "desc"; } },
        medal(i) {
          const good = this.sortDir === (METRICS[this.sortKey]?.better === "lower" ? "asc" : "desc");
          return good && i < 3 ? MEDALS[i] : "";
        },
        go(r) { if (r.status !== "DNF") location.href = "submission.html?run=" + encodeURIComponent(r.id); },
      };
    }
  </script>
