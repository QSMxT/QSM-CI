<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>QSM-CI — Methods</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script>tailwind.config = { theme: { extend: { fontFamily: { sans: ["Inter", "system-ui", "sans-serif"] } } } };</script>
  <script src="js/app.js"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
</head>
<body class="font-sans text-gray-900 bg-gray-50 antialiased">
  <header id="site-nav"></header>

  <main x-data="methods()" x-init="init()" class="mx-auto max-w-6xl px-6 py-10">
    <h1 class="text-3xl font-bold tracking-tight">Methods</h1>
    <p class="mt-1 text-gray-600">The reconstruction algorithms in the challenge — what they are, their parameters, and references.</p>

    <template x-for="stage in stages" :key="stage.key">
      <section class="mt-10">
        <h2 class="text-sm font-semibold uppercase tracking-wide text-gray-500" x-text="stage.label"></h2>
        <div class="mt-4 grid md:grid-cols-2 gap-5">
          <template x-for="a in stage.algos" :key="a.slug">
            <div class="rounded-2xl border border-gray-200 bg-white p-5 shadow-sm flex flex-col">
              <div class="flex items-start justify-between gap-3">
                <div>
                  <h3 class="font-semibold text-gray-900" x-text="a.name"></h3>
                  <p class="mt-0.5 text-xs text-gray-400" x-text="a.engine || (a.authors||[]).join(', ')"></p>
                </div>
                <template x-if="a.xsim != null">
                  <a :href="'submission.html?run=' + a.runId"
                     class="shrink-0 rounded-lg bg-indigo-50 px-2.5 py-1 text-xs font-semibold text-indigo-700 hover:bg-indigo-100"
                     title="View reconstruction">XSIM <span x-text="a.xsim.toFixed(3)"></span></a>
                </template>
              </div>

              <p class="mt-3 text-sm text-gray-600" x-text="a.description"></p>

              <template x-if="a.parameters && a.parameters.length">
                <table class="mt-3 w-full text-xs">
                  <tbody>
                    <template x-for="p in a.parameters" :key="p.name">
                      <tr class="border-t border-gray-100">
                        <td class="py-1.5 pr-2 font-mono text-gray-700" x-text="p.name"></td>
                        <td class="py-1.5 pr-2 tabular-nums text-gray-500" x-text="p.default"></td>
                        <td class="py-1.5 text-gray-400" x-text="p.description"></td>
                      </tr>
                    </template>
                  </tbody>
                </table>
              </template>

              <div class="mt-auto pt-4 flex flex-wrap items-center gap-x-4 gap-y-1 text-xs">
                <span class="text-gray-500" x-show="a.citation" x-text="a.citation"></span>
                <a x-show="a.doi" :href="'https://doi.org/' + a.doi" class="text-indigo-600 hover:underline">doi</a>
                <a x-show="a.code_url" :href="a.code_url" class="text-indigo-600 hover:underline">source</a>
                <template x-if="a.runId">
                  <a :href="'submission.html?run=' + a.runId" class="ml-auto font-semibold text-indigo-600 hover:text-indigo-700">View reconstruction →</a>
                </template>
                <span x-show="!a.runId" class="ml-auto text-gray-300">no result</span>
              </div>
            </div>
          </template>
        </div>
      </section>
    </template>
  </main>

  <footer id="site-footer"></footer>

  <script>
    function methods() {
      return {
        stages: [],
        async init() {
          const [algos, runs] = await Promise.all([loadAlgos(), loadRuns()]);
          const iso = {};
          runs.filter((r) => r.mode === "isolated").forEach((r) => { iso[r.slug] = r; });
          algos.forEach((a) => {
            const r = iso[a.slug];
            a.xsim = r && r.status !== "DNF" ? (r.metrics?.xsim ?? null) : null;
            a.runId = r && r.status !== "DNF" ? r.id : null;
          });
          const order = [["field-mapping", "Field mapping"], ["bfr", "Background field removal"], ["dipole", "Dipole inversion"]];
          this.stages = order
            .map(([key, label]) => ({ key, label, algos: algos.filter((a) => a.stage === key).sort((x, y) => (y.xsim ?? -1) - (x.xsim ?? -1)) }))
            .filter((s) => s.algos.length);
        },
      };
    }
  </script>
</body>
</html>
