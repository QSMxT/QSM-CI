name: eval-image

# Build and publish the qsm-eval scorer image to GHCR whenever the scorer changes.

on:
  push:
    branches: [main]
    paths:
      - "eval/**"
      - ".github/workflows/eval-image.yml"
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: eval
          file: eval/Dockerfile
          push: true
          tags: |
            ghcr.io/astewartau/qsm-ci/qsm-eval:latest
            ghcr.io/astewartau/qsm-ci/qsm-eval:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
