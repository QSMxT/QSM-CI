name: matlab-compile

# Compile a MATLAB submission's source (algorithm.yml `matlab.entry`) into a standalone binary and
# bake it into an MCR image. Runs on a SELF-HOSTED runner that has MATLAB + MATLAB Compiler and a
# license (network license servers are reachable here — this is the build phase, network allowed).
# The resulting image runs license-free on the free MATLAB Runtime during scoring (evaluate.yml).
#
# Setup required: a runner labelled [self-hosted, matlab] with MATLAB + Compiler installed, and the
# MLM_LICENSE_FILE secret (port@host or a license file path).

on:
  workflow_dispatch:
    inputs:
      slug:
        description: "Algorithm slug under algorithms/ to compile"
        required: true

permissions:
  contents: read
  packages: write

jobs:
  compile:
    runs-on: [self-hosted, matlab]
    steps:
      - uses: actions/checkout@v4

      - name: Read matlab spec
        id: spec
        run: |
          f="algorithms/${{ inputs.slug }}/algorithm.yml"
          blk=$(sed -n '/^matlab:/,$p' "$f")
          echo "entry=$(echo "$blk"   | grep 'entry:'   | awk '{print $2}')" >> "$GITHUB_OUTPUT"
          echo "runtime=$(echo "$blk" | grep 'runtime:' | awk '{print $2}')" >> "$GITHUB_OUTPUT"
          echo "image=$(grep '^image:' "$f" | awk '{print $2}')" >> "$GITHUB_OUTPUT"

      - name: Compile with MATLAB Compiler
        working-directory: algorithms/${{ inputs.slug }}
        env:
          MLM_LICENSE_FILE: ${{ secrets.MLM_LICENSE_FILE }}
        run: |
          matlab -batch "mcc('-m','${{ steps.spec.outputs.entry }}','-o','recon','-d','.')"
          test -x ./recon

      - name: Bake MCR image and push
        working-directory: algorithms/${{ inputs.slug }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          cat > Dockerfile.mcr <<EOF
          FROM containers.mathworks.com/matlab-runtime:${{ steps.spec.outputs.runtime }}
          COPY recon /opt/qsm-ci/recon
          RUN chmod +x /opt/qsm-ci/recon
          EOF
          docker build -f Dockerfile.mcr -t "${{ steps.spec.outputs.image }}" .
          echo "$GH_TOKEN" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin
          docker push "${{ steps.spec.outputs.image }}"
