name: matlab-compile

# Compile a MATLAB submission's source (algorithm.yml `matlab.entry`) into a standalone binary and
# bake it into an MCR image, on a GitHub-hosted runner using MathWorks' official actions. The
# compiled binary then runs license-free on the free MATLAB Runtime during scoring.
#
# Licensing: mcc needs a license at BUILD time only. On hosted runners that's a MATLAB *batch
# licensing token* (free for public repos from MathWorks). Store it as the secret MATLAB_BATCH_TOKEN.

on:
  workflow_dispatch:
    inputs:
      slug:
        description: "Algorithm slug under algorithms/ to compile"
        required: true

permissions:
  contents: read
  packages: write

jobs:
  compile:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Read matlab spec
        id: spec
        run: |
          f="algorithms/${{ inputs.slug }}/algorithm.yml"
          blk=$(sed -n '/^matlab:/,$p' "$f")
          echo "entry=$(echo "$blk"   | grep 'entry:'   | awk '{print $2}')" >> "$GITHUB_OUTPUT"
          echo "runtime=$(echo "$blk" | grep 'runtime:' | awk '{print $2}')" >> "$GITHUB_OUTPUT"
          echo "image=$(grep '^image:' "$f" | awk '{print $2}')" >> "$GITHUB_OUTPUT"

      - name: Set up MATLAB + Compiler
        uses: matlab-actions/setup-matlab@v2
        with:
          products: MATLAB Compiler

      - name: Compile recon.m -> standalone binary
        uses: matlab-actions/run-command@v2
        env:
          MLM_LICENSE_TOKEN: ${{ secrets.MATLAB_BATCH_TOKEN }}
        with:
          command: cd(fullfile('algorithms', '${{ inputs.slug }}')); mcc('-m', '${{ steps.spec.outputs.entry }}', '-o', 'recon', '-d', '.')

      - name: Bake MCR image and push
        working-directory: algorithms/${{ inputs.slug }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          test -x ./recon
          cat > Dockerfile.mcr <<EOF
          FROM containers.mathworks.com/matlab-runtime:${{ steps.spec.outputs.runtime }}
          COPY recon /opt/qsm-ci/recon
          RUN chmod +x /opt/qsm-ci/recon
          EOF
          docker build -f Dockerfile.mcr -t "${{ steps.spec.outputs.image }}" .
          echo "$GH_TOKEN" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin
          docker push "${{ steps.spec.outputs.image }}"
