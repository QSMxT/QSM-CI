name: score

# Recompute leaderboard results and publish viewer volumes — only when something actually changed
# (not on a weekly timer). Scoring is PARALLELISED across GitHub-hosted runners: a full re-run is
# split into N disjoint shards (pipeline.py --shard i/N, column-sharded so each bfr localfield is
# computed once), a focused re-run fans out one job per changed slug. Each job writes its own runs +
# volumes; a single merge job combines them, publishes volumes to Hugging Face, and commits the
# small results/index.json (which triggers the Pages deploy).
#
# Scope:
#   - a changed algorithm  -> that algorithm's isolated run + every composed combo that includes it
#   - changed scorer / orchestration (eval, pipeline, stages) -> a full re-run of everything

on:
  push:
    branches: [main]
    paths:
      - "algorithms/**"
      - "eval/**"
      - "scripts/pipeline.py"
      - "scripts/publish_volumes.py"
      - "stages.yml"
      # NB: score.yml itself is intentionally NOT here — editing the workflow shouldn't rescore the
      # world. For a real scoring-logic change, dispatch with scope=all.
  workflow_dispatch:
    inputs:
      scope:
        description: "all | <comma-separated slugs> (default: auto-detect from the diff)"
        default: "auto"
      shards:
        description: "number of parallel shards for a full re-run"
        default: "12"
      dry_run:
        description: "true = score + merge but DON'T publish volumes or commit (upload a candidate index artifact instead)"
        default: "false"

# One rescore at a time — a new run queues behind the in-progress one instead of racing it (the merge
# job commits results/index.json, so overlapping runs could clobber each other / fail to push).
concurrency:
  group: score
  cancel-in-progress: false

permissions:
  contents: write

env:
  TRACK: sim
  SETUPTOOLS_SCM_PRETEND_VERSION: "0.0.0"   # shallow checkout has no tags for setuptools-scm
  # GitHub-hosted runners have ~16 GB RAM; pipeline.py's default of 4 concurrent containers (tuned for
  # the ~31 GB self-hosted box) OOM-kills the runner when MATLAB/DL containers coincide ("hosted runner
  # lost communication"). Cap at 2 — parallelism comes from the shard matrix, not intra-shard threads.
  QSM_CI_JOBS: "2"

jobs:
  scope:
    runs-on: ubuntu-latest
    outputs:
      full: ${{ steps.decide.outputs.full }}
      slugs: ${{ steps.decide.outputs.slugs }}
    steps:
      - uses: actions/checkout@v7
        with: { fetch-depth: 0 }
      - id: decide
        run: |
          scope="${{ github.event.inputs.scope }}"
          if [ "$scope" = "all" ]; then
            echo "full=true"  >>"$GITHUB_OUTPUT"; echo "slugs=[]" >>"$GITHUB_OUTPUT"; exit 0
          fi
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ -n "$scope" ] && [ "$scope" != "auto" ]; then
            echo "full=false" >>"$GITHUB_OUTPUT"
            echo "slugs=$(echo "$scope" | tr ', ' '\n' | grep . | jq -R . | jq -sc .)" >>"$GITHUB_OUTPUT"; exit 0
          fi
          changed=$(git diff --name-only ${{ github.event.before }} ${{ github.sha }} 2>/dev/null \
                    || git diff --name-only HEAD~1 HEAD)
          if echo "$changed" | grep -qE '^(eval/|scripts/pipeline\.py|scripts/publish_volumes\.py|stages\.yml)'; then
            echo "full=true"  >>"$GITHUB_OUTPUT"; echo "slugs=[]" >>"$GITHUB_OUTPUT"
          else
            slugs=$(echo "$changed" | grep '^algorithms/' | cut -d/ -f2 | grep -v '^_' | sort -u | jq -R . | jq -sc .)
            echo "full=false" >>"$GITHUB_OUTPUT"; echo "slugs=$slugs" >>"$GITHUB_OUTPUT"
          fi

  # Turn the scope into a matrix of parallel tasks: full -> N shards; focused -> one job per slug.
  plan:
    needs: scope
    if: needs.scope.outputs.full == 'true' || needs.scope.outputs.slugs != '[]'
    runs-on: ubuntu-latest
    outputs:
      tasks: ${{ steps.gen.outputs.tasks }}
    steps:
      - id: gen
        # slugs/full come in as env vars (not inlined) — the slugs JSON contains double quotes that
        # would otherwise break the python -c "..." string in the focused branch.
        env:
          FULL: ${{ needs.scope.outputs.full }}
          SLUGS: ${{ needs.scope.outputs.slugs }}
          N: ${{ github.event.inputs.shards || '12' }}
        run: |
          if [ "$FULL" = "true" ]; then
            TASKS=$(python3 -c "import json,os;N=int(os.environ['N']);print(json.dumps([{'id':'s%02d'%i,'shard':'%d/%d'%(i,N)} for i in range(N)]))")
          else
            TASKS=$(python3 -c "import json,os;s=json.loads(os.environ['SLUGS']);print(json.dumps([{'id':'f-'+x,'focus':x} for x in s]))")
          fi
          echo "tasks=$TASKS" >>"$GITHUB_OUTPUT"
          echo "planned tasks: $TASKS"

  score:
    needs: [scope, plan]
    strategy:
      fail-fast: false
      matrix:
        task: ${{ fromJson(needs.plan.outputs.tasks) }}
    runs-on: ubuntu-latest
    timeout-minutes: 180
    steps:
      - uses: actions/checkout@v7

      - name: Install qsm-ci CLI + scorer deps
        run: |
          pip install -r eval/requirements.txt huggingface_hub
          pip install --upgrade setuptools setuptools_scm wheel
          pip install --no-build-isolation .

      - name: Cache OSF dataset zip
        uses: actions/cache@v6
        with:
          path: .osfcache/bids.zip
          key: osf-bids-698ac9aecae88916d1e24f69
      - name: Fetch dataset (public inputs + held-out ground truth)
        env:
          OSF_TOKEN: ${{ secrets.OSF_TOKEN }}
          OSF_ZIP: .osfcache/bids.zip
        run: scripts/fetch_dataset.sh "$TRACK" data/${TRACK}/scoring

      - name: Score task ${{ matrix.task.id }}
        run: |
          DS="data/${TRACK}/scoring"
          ARGS="--dataset $DS --mode both --runner docker --track $TRACK --emit-volumes --runs-out runs-${{ matrix.task.id }}.json"
          [ -n "${{ matrix.task.shard }}" ] && ARGS="$ARGS --shard ${{ matrix.task.shard }}"
          [ -n "${{ matrix.task.focus }}" ] && ARGS="$ARGS --focus ${{ matrix.task.focus }}"
          echo "== task ${{ matrix.task.id }}: pipeline.py $ARGS =="
          t0=$(date +%s)
          python scripts/pipeline.py $ARGS
          echo "== task ${{ matrix.task.id }} wall-clock: $(( $(date +%s) - t0 ))s =="

      - uses: actions/upload-artifact@v7
        with:
          name: shard-${{ matrix.task.id }}
          retention-days: 1
          path: |
            runs-${{ matrix.task.id }}.json
            results
            !results/index.json

  merge:
    needs: [scope, score]
    if: ${{ !cancelled() && needs.score.result != 'skipped' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/download-artifact@v8
        with:
          pattern: shard-*
          merge-multiple: true
          path: .

      - name: Merge deps
        run: pip install -r eval/requirements.txt huggingface_hub

      - name: Merge shard runs into results/index.json
        run: |
          python3 - <<'PY'
          import json, glob
          from collections import Counter
          runs = []
          for f in sorted(glob.glob("runs-*.json")):
              runs += json.load(open(f))
          idx = json.load(open("results/index.json"))
          ids = {r["id"] for r in runs}
          merged = [r for r in idx["runs"] if r.get("id") not in ids] + runs
          json.dump({"generated": None, "runs": merged}, open("results/index.json", "w"), indent=2)
          dup = [i for i, c in Counter(r["id"] for r in runs).items() if c > 1]
          dnf = sorted(r["id"] for r in runs if r.get("status") == "DNF")
          print(f"merged {len(runs)} shard runs; index now {len(merged)} total")
          print(f"duplicate ids across shards: {dup or 'none (partition OK)'}")
          print(f"DNF ({len(dnf)}): {', '.join(dnf) if dnf else 'none'}")
          PY

      - name: Publish volumes to Hugging Face
        if: ${{ github.event.inputs.dry_run != 'true' }}
        continue-on-error: true
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          HF_VOLUMES_REPO: ${{ vars.HF_VOLUMES_REPO }}
        run: python scripts/publish_volumes.py results

      - name: Commit results index (triggers the Pages deploy)
        if: ${{ github.event.inputs.dry_run != 'true' }}
        run: |
          git config user.name  "qsm-ci-bot"
          git config user.email "qsm-ci@users.noreply.github.com"
          git add results/index.json
          git commit -m "Update results" || { echo "no changes"; exit 0; }
          for attempt in 1 2 3 4 5; do
            git pull --rebase origin main && git push && exit 0
            echo "push attempt $attempt rejected — retrying"; sleep $((attempt * 5))
          done
          echo "::error::could not push results after 5 attempts"; exit 1

      - name: (dry-run) upload candidate index instead of committing
        if: ${{ github.event.inputs.dry_run == 'true' }}
        uses: actions/upload-artifact@v7
        with:
          name: index-candidate
          path: results/index.json
