name: score

# Recompute leaderboard results and publish viewer volumes — only when something actually changed
# (not on a weekly timer). Scope:
#   - a changed algorithm  -> that algorithm's isolated run + every composed combo that includes it
#   - changed scorer / orchestration (eval, pipeline, stages) -> a full re-run of everything
# Volumes go to a Hugging Face dataset repo; only the small results/index.json is committed
# (which triggers the Pages deploy).

on:
  push:
    branches: [main]
    paths:
      - "algorithms/**"
      - "eval/**"
      - "scripts/pipeline.py"
      - "scripts/publish_volumes.py"
      - "stages.yml"
      # NB: score.yml itself is intentionally NOT here — editing the workflow (e.g. concurrency)
      # shouldn't rescore the world. For a real scoring-logic change, dispatch with scope=all.
  workflow_dispatch:
    inputs:
      scope:
        description: "all | <comma-separated slugs> (default: auto-detect from the diff)"
        default: "auto"

# One rescore at a time — a new run queues behind the in-progress one instead of racing it (both
# commit results/index.json, so overlapping runs could clobber each other / fail to push).
concurrency:
  group: score
  cancel-in-progress: false

permissions:
  contents: write

env:
  TRACK: sim

jobs:
  scope:
    runs-on: ubuntu-latest
    outputs:
      full: ${{ steps.decide.outputs.full }}
      slugs: ${{ steps.decide.outputs.slugs }}
    steps:
      - uses: actions/checkout@v4
        with: { fetch-depth: 0 }
      - id: decide
        run: |
          scope="${{ github.event.inputs.scope }}"
          if [ "$scope" = "all" ]; then
            echo "full=true"  >>"$GITHUB_OUTPUT"; echo "slugs=[]" >>"$GITHUB_OUTPUT"; exit 0
          fi
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ -n "$scope" ] && [ "$scope" != "auto" ]; then
            echo "full=false" >>"$GITHUB_OUTPUT"
            echo "slugs=$(echo "$scope" | tr ', ' '\n' | grep . | jq -R . | jq -sc .)" >>"$GITHUB_OUTPUT"; exit 0
          fi
          changed=$(git diff --name-only ${{ github.event.before }} ${{ github.sha }} 2>/dev/null \
                    || git diff --name-only HEAD~1 HEAD)
          if echo "$changed" | grep -qE '^(eval/|scripts/pipeline\.py|scripts/publish_volumes\.py|stages\.yml)'; then
            echo "full=true"  >>"$GITHUB_OUTPUT"; echo "slugs=[]" >>"$GITHUB_OUTPUT"
          else
            slugs=$(echo "$changed" | grep '^algorithms/' | cut -d/ -f2 | grep -v '^_' | sort -u | jq -R . | jq -sc .)
            echo "full=false" >>"$GITHUB_OUTPUT"; echo "slugs=$slugs" >>"$GITHUB_OUTPUT"
          fi

  score:
    needs: scope
    if: needs.scope.outputs.full == 'true' || needs.scope.outputs.slugs != '[]'
    runs-on: [self-hosted, Linux, X64]
    # The serial composed matrix on the large 7T volume exceeds the default 6h job timeout and
    # gets cancelled before publishing results. Raise the limit so runs can finish + commit
    # index.json. (Real fix is parallelising pipeline.py / trimming slow submissions — deferred.)
    timeout-minutes: 720
    steps:
      - uses: actions/checkout@v4

      - name: Install scorer deps
        # `.` installs the qsm-ci CLI onto PATH — pipeline.py --runner docker delegates each run to
        # `qsm-ci run …` (one run path, no CI-side container builds).
        run: |
          pip install -r eval/requirements.txt huggingface_hub
          pip install --upgrade setuptools setuptools_scm wheel   # runner's build tools are too old for setuptools-scm
          pip install --no-build-isolation .                       # build the CLI with the upgraded tools

      - name: Cache OSF dataset zip
        uses: actions/cache@v4
        with:
          path: .osfcache/bids.zip
          key: osf-bids-698ac9aecae88916d1e24f69
      - name: Fetch dataset (public inputs + held-out ground truth)
        env:
          OSF_TOKEN: ${{ secrets.OSF_TOKEN }}
          OSF_ZIP: .osfcache/bids.zip
        run: scripts/fetch_dataset.sh "$TRACK" data/${TRACK}/scoring

      - name: Score (build envs with network, run offline, emit volumes)
        run: |
          DS="data/${TRACK}/scoring"
          if [ "${{ needs.scope.outputs.full }}" = "true" ]; then
            echo "::notice::full re-run"
            python scripts/pipeline.py --dataset "$DS" --mode both --runner docker --track "$TRACK" --emit-volumes
          else
            for slug in $(echo '${{ needs.scope.outputs.slugs }}' | jq -r '.[]'); do
              echo "::notice::focus $slug"
              python scripts/pipeline.py --dataset "$DS" --mode both --runner docker --track "$TRACK" \
                --emit-volumes --focus "$slug"
            done
          fi

      - name: Publish volumes to Hugging Face
        # Best-effort viewer volumes — must never block committing the leaderboard scores below.
        continue-on-error: true
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          HF_VOLUMES_REPO: ${{ vars.HF_VOLUMES_REPO }}
        run: python scripts/publish_volumes.py results

      - name: Squash HF volume history (full re-publish only — reclaim old LFS versions)
        # A full rescore regenerates every error map (etc.), leaving old LFS versions as orphaned
        # storage. Collapse history to one commit so they're reclaimed (~36h). Full runs only —
        # focused re-publishes churn too few files to bother. Best-effort; never blocks the commit.
        if: ${{ needs.scope.outputs.full == 'true' }}
        continue-on-error: true
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          HF_VOLUMES_REPO: ${{ vars.HF_VOLUMES_REPO }}
        run: python scripts/squash_hf_history.py

      - name: Commit results index (triggers the Pages deploy)
        # Always commit the scored index.json even if the volume publish failed — the
        # leaderboard (scores) lives here; the HF volumes are only for the NiiVue viewer.
        if: ${{ !cancelled() }}
        run: |
          git config user.name  "qsm-ci-bot"
          git config user.email "qsm-ci@users.noreply.github.com"
          # main can advance while this long scoring job runs (a PR merge, a registry commit, or an
          # earlier rescore whose results this run was based *before*). Do NOT rebase index.json onto
          # it — concurrent rescores touch the same file and rebasing conflicts, losing the scores
          # (that was the #72 failure). Instead re-apply only the runs THIS rescore changed, by id,
          # onto the latest index.json each attempt (scripts/merge_index.py).
          cp results/index.json /tmp/scored.json
          git show HEAD:results/index.json > /tmp/base.json 2>/dev/null || echo '{"runs":[]}' > /tmp/base.json
          for attempt in 1 2 3 4 5; do
            git fetch -q origin main
            git reset -q --hard origin/main            # latest main (discards any prior failed attempt)
            python3 scripts/merge_index.py /tmp/base.json /tmp/scored.json results/index.json results/index.json
            git add results/index.json
            git diff --cached --quiet && { echo "no score changes to commit"; exit 0; }
            git commit -q -m "Update results"
            git push -q && exit 0
            echo "push attempt $attempt rejected — main moved; retrying"; sleep $((attempt * 5))
          done
          echo "::error::could not push results after 5 attempts"; exit 1
