name: ci

# Fast, secret-free smoke tests for the qsm-ci CLI, all container runners, scoring, and the
# --set parameter passthrough. Runs on GitHub-hosted runners with tiny public images + synthetic
# NIfTIs — no OSF data, no self-hosted runner. (Real algorithm scoring lives in evaluate.yml.)

on:
  push:
  pull_request:

jobs:
  interfaces:
    # Workflow-engine interfaces (qsm_ci.nipype / qsm_ci.pydra) + the `qsm-ci interface` generator,
    # exercised on a qsm-forward phantom with the container-free `local` runner. Fast, secret-free.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install package + interface extras + qsm-forward
        run: pip install ".[nipype,pydra]" pytest pyyaml qsm-forward

      - name: Install apptainer  # docker + podman are preinstalled on ubuntu-latest
        run: |
          ver=1.3.6
          wget -q "https://github.com/apptainer/apptainer/releases/download/v${ver}/apptainer_${ver}_amd64.deb"
          sudo apt-get update -qq
          sudo apt-get install -y "./apptainer_${ver}_amd64.deb"

      - name: Generate a qsm-forward phantom
        run: |
          qsm-forward simple /tmp/bids --resolution 40 40 40 --save-field
          python scripts/pack_dataset.py /tmp/bids /tmp/phantom

      - name: Interface tests (stubs × docker·podman·apptainer·local + a real tkd run + generator)
        env:
          QSMCI_PHANTOM: /tmp/phantom
        run: pytest -q tests/test_interfaces.py

  cli:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install package + test deps
        run: pip install . pytest

      - name: Environment
        run: |
          qsm-ci --version
          qsm-ci doctor

      - name: Scorer selfcheck + unit tests
        run: |
          python eval/qsm_eval.py --selfcheck
          pytest -q eval/test_metrics.py tests/test_manifest.py tests/test_runner_help.py tests/test_submissions.py

      - name: Scaffold check (qsm-ci new)
        run: |
          qsm-ci new --stage dipole --name "Smoke Test" --lang python --dir /tmp/scaf
          test -f /tmp/scaf/smoke-test/algorithm.yml
          test -f /tmp/scaf/smoke-test/recon.py

      - name: Synthetic fixtures
        run: python tests/make_fixtures.py /tmp/fix

      - name: Parameter passthrough (--set, local runner)
        run: |
          out=$(qsm-ci run tests/methods/scale-method --runner local \
            --localfield /tmp/fix/inputs/localfield.nii.gz \
            --mask /tmp/fix/inputs/mask.nii.gz \
            --params /tmp/fix/inputs/params.json \
            --set scale=2 -o /tmp/scaled.nii.gz)
          echo "$out"
          echo "$out" | grep -q "CONFIG: {'scale': 2}"

      - name: Install apptainer
        run: |
          ver=1.3.6
          wget -q "https://github.com/apptainer/apptainer/releases/download/v${ver}/apptainer_${ver}_amd64.deb"
          sudo apt-get update -qq
          sudo apt-get install -y "./apptainer_${ver}_amd64.deb"

      - name: Container runners — docker · podman · apptainer
        run: |
          set -euo pipefail
          for r in docker podman apptainer; do
            echo "::group::runner=$r"
            out=$(qsm-ci run tests/methods/cp-method --runner "$r" \
              --localfield /tmp/fix/inputs/localfield.nii.gz \
              --mask /tmp/fix/inputs/mask.nii.gz \
              --params /tmp/fix/inputs/params.json \
              --truth /tmp/fix/groundtruth/chimap.nii.gz \
              -o "/tmp/chi_${r}.nii.gz")
            echo "$out"
            echo "$out" | grep -q "correlation" && echo "$out" | grep -q "1.0000"
            echo "::endgroup::"
          done
