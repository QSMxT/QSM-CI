name: osf-check

# Manually validate the OSF volume-publish path (scripts/publish_volumes.py) against the live
# component — without a full scoring run. Uploads a few tiny synthetic volumes, confirms the URLs
# recorded in index.json are publicly downloadable, then deletes the test files from OSF.
# Needs secrets: OSF_TOKEN (read+write), OSF_VOLUMES_NODE (e.g. sn52e).

on:
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install numpy nibabel osfclient

      - name: Synthesize a tiny run + volumes
        run: |
          python - <<'PY'
          import json
          from pathlib import Path
          import nibabel as nib, numpy as np
          d = Path("results/__osfcheck"); d.mkdir(parents=True, exist_ok=True)
          for k in ("recon", "truth", "error"):
              nib.save(nib.Nifti1Image(np.zeros((6, 6, 6), "float32"), np.eye(4)), d / f"{k}.nii.gz")
          Path("results/index.json").write_text(
              json.dumps({"runs": [{"id": "__osfcheck", "slug": "x", "name": "osf-check"}]}))
          PY

      - name: Publish to OSF + verify public download
        env:
          OSF_TOKEN: ${{ secrets.OSF_TOKEN }}
          OSF_VOLUMES_NODE: ${{ secrets.OSF_VOLUMES_NODE }}
        run: |
          python scripts/publish_volumes.py results
          url=$(python -c "import json;print(json.load(open('results/index.json'))['runs'][0]['volumes']['recon'])")
          echo "recon URL: $url"
          curl -fsSL "$url" -o /tmp/dl.nii.gz
          echo "✓ public download OK ($(stat -c%s /tmp/dl.nii.gz) bytes)"

      - name: Clean up the test files from OSF
        if: always()
        env:
          OSF_TOKEN: ${{ secrets.OSF_TOKEN }}
          OSF_VOLUMES_NODE: ${{ secrets.OSF_VOLUMES_NODE }}
        run: |
          python - <<'PY'
          import os
          from osfclient import OSF
          storage = OSF(token=os.environ["OSF_TOKEN"]).project(os.environ["OSF_VOLUMES_NODE"]).storage("osfstorage")
          for f in storage.files:
              if f.name.startswith("__osfcheck__"):
                  f.remove(); print("removed", f.name)
          PY
