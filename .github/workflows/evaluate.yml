name: evaluate

# Per-PR isolated evaluation of a changed submission: run its stage on the ground-truth boundary
# (in its container, no network) and score the output. Runs on Neurodesk's self-hosted ARC runners.
# The full composition matrix runs separately in score.yml (on merge to main).

on:
  pull_request:
    paths:
      - "algorithms/**"
  workflow_dispatch:
    inputs:
      slug:
        description: "Algorithm slug under algorithms/ to evaluate"
        required: true

permissions:
  contents: write
  pull-requests: write

env:
  TRACK: sim

jobs:
  discover:
    runs-on: ubuntu-latest
    outputs:
      slugs: ${{ steps.changed.outputs.slugs }}
    steps:
      - uses: actions/checkout@v4
        with: { fetch-depth: 0 }
      - id: changed
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "slugs=[\"${{ inputs.slug }}\"]" >> "$GITHUB_OUTPUT"
          else
            # Candidate slugs from the diff, then keep only those that still exist — a submission
            # that was *deleted* (or a non-submission file under algorithms/) has no algorithm.yml
            # and can't be evaluated, so drop it instead of failing on it.
            git diff --name-only origin/${{ github.base_ref }}... \
              | grep '^algorithms/' | cut -d/ -f2 | grep -v '^_' | sort -u \
              | while read -r slug; do [ -f "algorithms/$slug/algorithm.yml" ] && echo "$slug"; done \
              | jq -R . | jq -sc . | sed 's/^/slugs=/' >> "$GITHUB_OUTPUT"
          fi

  evaluate:
    needs: discover
    if: needs.discover.outputs.slugs != '[]'
    runs-on: [self-hosted, Linux, X64]
    strategy:
      fail-fast: false
      matrix:
        slug: ${{ fromJson(needs.discover.outputs.slugs) }}
    steps:
      - uses: actions/checkout@v4

      - name: Install scorer deps
        # `.` installs the qsm-ci CLI onto PATH — pipeline.py --runner docker delegates each run to
        # `qsm-ci run …` (one run path, no CI-side container builds).
        run: |
          pip install -r eval/requirements.txt
          pip install --upgrade setuptools setuptools_scm wheel   # runner's build tools are too old for setuptools-scm
          pip install --no-build-isolation .                       # build the CLI with the upgraded tools

      - name: Cache OSF dataset zip
        uses: actions/cache@v4
        with:
          path: .osfcache/bids.zip
          key: osf-bids-698ac9aecae88916d1e24f69
      - name: Fetch dataset (public inputs + held-out ground truth)
        env:
          OSF_TOKEN: ${{ secrets.OSF_TOKEN }}
          OSF_ZIP: .osfcache/bids.zip
        run: scripts/fetch_dataset.sh "$TRACK" data/${TRACK}/scoring

      - name: Isolated evaluation (build env with network, run offline, mount code)
        # --fail-on-dnf: a submission that can't run (missing/broken run.sh, crash, wrong output
        # artifact) turns this check RED instead of merging green and silently scoring DNF on main.
        run: |
          python scripts/pipeline.py \
            --dataset data/${TRACK}/scoring \
            --mode isolated --runner docker --only "${{ matrix.slug }}" --track "$TRACK" --fail-on-dnf

      - name: Comment metrics on PR
        # always() so a DNF (which fails the eval step above) still posts its metrics/DNF comment —
        # the job stays red, but the PR shows why.
        if: ${{ always() && github.event_name == 'pull_request' }}
        env:
          PR_NUMBER: ${{ github.event.pull_request.number }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: scripts/pr_comment.sh "${{ matrix.slug }}"
