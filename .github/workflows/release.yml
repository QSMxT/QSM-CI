name: release

# Publish the `qsm-ci` CLI to PyPI when a GitHub Release is published. The version comes from the
# release's git tag (vX.Y.Z -> X.Y.Z) via setuptools-scm — nothing in the repo is edited.
#
# Auth is PyPI Trusted Publishing (OIDC): no token/secret is stored. One-time setup on pypi.org:
#   Your project -> Publishing -> add a "pending publisher":
#     Owner: QSMxT   Repository: QSM-CI   Workflow: release.yml   Environment: (leave blank)

on:
  release:
    types: [published]

permissions:
  contents: read

jobs:
  build-and-publish:
    name: Build sdist + wheel and publish to PyPI
    runs-on: ubuntu-latest
    permissions:
      id-token: write   # required for Trusted Publishing (OIDC)
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0   # setuptools-scm needs the full history + tags to derive the version

      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Build
        run: |
          python -m pip install --upgrade build
          python -m build

      - name: Check the version matches the release tag
        run: |
          ver=$(ls dist/*.whl | sed -E 's/.*qsm_ci-([^-]+)-.*/\1/')
          tag="${GITHUB_REF_NAME#v}"
          echo "wheel version: $ver   release tag: $tag"
          if [ "$ver" != "$tag" ]; then
            echo "::error::wheel version $ver does not match release tag $tag"; exit 1
          fi

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
