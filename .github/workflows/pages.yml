name: pages

# Deploy the static leaderboard (web/ + results/) to GitHub Pages.
# No build step — the site is vanilla HTML/JS and reads results/index.json at runtime.

on:
  push:
    branches: [main]
    paths:
      - "web/**"
      - "results/**"
      - ".github/workflows/pages.yml"
  # The `score` job commits results/index.json with the default GITHUB_TOKEN, whose pushes do
  # NOT trigger the `push` event above — so deploy explicitly once scoring finishes.
  workflow_run:
    workflows: ["score"]
    types: [completed]
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Assemble site (web/ + results/ served alongside)
        run: |
          mkdir -p _site
          cp -r web/* _site/
          cp -r results _site/results
          cp -r docs _site/docs           # the Submit page renders docs/submitting.md
          rm -rf _site/examples; cp -r examples _site/examples   # Run page showcases the engine examples
          cp qsm_ci/registry.json _site/registry.json           # method DOIs shown on the leaderboard

      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with: { path: _site }
      - id: deployment
        uses: actions/deploy-pages@v4
