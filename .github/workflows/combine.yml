name: combine

# Composition matrix: run every BFR × every dipole (and multi-stage spans), chaining real stage
# outputs, and score the final chimap. This is the "how do stages interact" study. Heavier than the
# per-PR isolated job, so it runs on demand and on a schedule rather than per push.

on:
  workflow_dispatch:
  schedule:
    - cron: "0 5 * * 1" # weekly

permissions:
  contents: write

env:
  TRACK: sim

jobs:
  matrix:
    runs-on: [self-hosted, neurodesk]
    steps:
      - uses: actions/checkout@v4

      - name: Install scorer deps
        run: pip install -r eval/requirements.txt

      - name: Fetch dataset (public inputs + held-out ground truth)
        env:
          OSF_TOKEN: ${{ secrets.OSF_TOKEN }}
        run: scripts/fetch_dataset.sh "$TRACK" data/${TRACK}/scoring

      - name: Pull all submission images
        run: |
          for f in algorithms/*/algorithm.yml; do
            grep '^image:' "$f" | awk '{print $2}'
          done | sort -u | xargs -n1 docker pull

      - name: Composition matrix (isolated + composed, containerized)
        run: |
          python scripts/pipeline.py \
            --dataset data/${TRACK}/scoring \
            --mode both --runner docker --track "$TRACK"

      - name: Commit results
        run: |
          git config user.name  "qsm-ci-bot"
          git config user.email "qsm-ci@users.noreply.github.com"
          git add results/index.json
          git commit -m "Update composition matrix results" || echo "no changes"
          git push
